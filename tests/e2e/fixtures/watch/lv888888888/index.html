<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E2E mock watch lv888888888</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 16px;
      }
      .body[role='rowgroup'] {
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      .table {
        min-height: 1200px;
        padding: 8px;
      }
      .table-row {
        padding: 4px 0;
        border-bottom: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <h1>nicolivelog E2E mock</h1>
    <p>URL は <code>/watch/lv888888888/</code>。コメントパネル構造のみニコ生に近い。</p>

    <!-- 先頭の .ga-ns-comment-panel が findNicoCommentPanel に選ばれるため、仮想リスト（行あり）を先に置く -->
    <video
      id="e2e-mock-video"
      width="320"
      height="180"
      autoplay
      muted
      playsinline
    ></video>
    <script>
      (function () {
        var c = document.createElement('canvas');
        c.width = 320;
        c.height = 180;
        var ctx = c.getContext('2d');
        function draw() {
          if (!ctx) return;
          ctx.fillStyle = '#2244aa';
          ctx.fillRect(0, 0, 320, 180);
          ctx.fillStyle = '#fff';
          ctx.font = '24px sans-serif';
          ctx.fillText('mock video', 80, 100);
          requestAnimationFrame(draw);
        }
        draw();
        var stream = c.captureStream(30);
        var v = document.getElementById('e2e-mock-video');
        if (v) v.srcObject = stream;
      })();
    </script>

    <div class="ga-ns-comment-panel">
      <div
        class="comment-data-grid data-grid"
        role="grid"
        data-scroll-mode="y"
        data-layout-type="pc"
      >
        <div class="body" role="rowgroup">
          <div class="table" role="rowgroup" id="mock-table"></div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var root = document.getElementById('mock-table');
        var html = '';
        for (var i = 1; i <= 25; i++) {
          html +=
            '<div class="table-row" data-comment-type="normal" role="row">' +
            '<span class="comment-number">' +
            i +
            '</span>' +
            '<div class="content-area"><span class="comment-text">mock body ' +
            i +
            '</span></div>' +
            '</div>';
        }
        root.innerHTML = html;
      })();
    </script>

    <!-- NLS_POST_COMMENT E2E: 送信後 1.8s で欄が空く（React 遅延クリアの模倣） -->
    <!-- comment-panel クラスはこのブロックのみ（.comment-panel セレクタの strict 一意） -->
    <div class="ga-ns-comment-panel comment-panel" id="e2e-comment-compose">
      <form id="e2e-comment-form">
        <textarea placeholder="コメントを入力" name="comment" rows="2"></textarea>
        <button type="submit" aria-label="コメントを送信">送信</button>
      </form>
    </div>
    <script>
      (function () {
        var form = document.getElementById('e2e-comment-form');
        if (!form) return;
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var ta = form.querySelector('textarea');
          if (!ta) return;
          setTimeout(function () {
            ta.value = '';
            try {
              ta.dispatchEvent(new Event('input', { bubbles: true }));
            } catch (err) {
              /* ignore */
            }
          }, 1800);
        });
      })();
    </script>
  </body>
</html>
